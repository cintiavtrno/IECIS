<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Gestão IECIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F9F0;
  --surface:#FFFFFF;
  --surface-2:#EDF5E5;
  --ink:#1A2B10;
  --ink-soft:#3D5C28;
  --ink-faint:#7A9A5A;
  --primary:#3A8A1A;
  --primary-dark:#2A6A10;
  --primary-soft:#C8EDAA;
  --accent:#E8780A;
  --accent-dark:#C05A00;
  --accent-soft:#FDEBD0;
  --entrada:#1A7A3A;
  --entrada-soft:#C8EDD8;
  --saida:#C03030;
  --saida-soft:#F5DADA;
  --border:#B8D898;
  --shadow-sm:0 1px 3px rgba(30,80,10,.08);
  --shadow-md:0 6px 24px rgba(30,80,10,.12);
  --radius:16px;
  --radius-sm:10px;
  --font-display:'Pacifico',cursive;
  --font-body:'Nunito',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
h1,h2,h3{font-family:var(--font-display);color:var(--ink);margin:0;font-weight:600;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:15px;}
a{color:var(--primary);}
::selection{background:var(--primary-soft);}
.mono{font-family:var(--font-mono);}
.muted{color:var(--ink-soft);}
.faint{color:var(--ink-faint);}
.hidden{display:none !important;}
.center{text-align:center;}
.right{text-align:right;}
.flex{display:flex;align-items:center;}
.gap-sm{gap:8px;}
.gap{gap:12px;}
.gap-lg{gap:20px;}
.wrap{flex-wrap:wrap;}
.spread{justify-content:space-between;}
.grow{flex:1;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;background:linear-gradient(135deg,#2A6A10 0%,#3A8A1A 40%,#E8780A 100%);position:relative;overflow:hidden;}
.auth-screen::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.auth-figures{position:absolute;bottom:0;left:0;right:0;height:120px;pointer-events:none;}
.auth-card{width:100%;max-width:400px;background:rgba(255,255,255,.97);border:none;border-radius:24px;box-shadow:0 24px 60px rgba(0,0,0,.30);padding:40px 34px;position:relative;z-index:2;}
.brand-logo{width:110px;height:110px;margin:0 auto 10px;display:block;object-fit:contain;}
.auth-title{font-size:28px;text-align:center;margin-bottom:2px;color:var(--primary);font-family:var(--font-display);letter-spacing:1px;}
.auth-sub{text-align:center;color:var(--ink-soft);font-size:13px;margin:0 0 22px;font-weight:600;line-height:1.5;}
.form-grid{display:flex;flex-direction:column;gap:14px;}
.form-grid label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
.form-grid input,.form-grid select,.form-grid textarea{border:2px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-size:15px;color:var(--ink);background:var(--surface);width:100%;font-weight:600;}
.form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(232,120,10,.15);}
.form-row{display:flex;gap:12px;}
.form-row>label{flex:1;}
.form-hint{font-size:12.5px;color:var(--ink-soft);margin:2px 0 0;line-height:1.45;}
.field-error{font-size:12px;color:var(--saida);margin-top:-2px;}
.divider{height:1px;background:var(--border);margin:6px 0;}
.error-banner{background:var(--saida-soft);color:var(--saida);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;font-weight:700;margin-top:4px;}

/* BONECO ANIMATIONS */
@keyframes walk{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes walkL{0%,100%{transform:translateY(0) scaleX(-1);}50%{transform:translateY(-6px) scaleX(-1);}}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(3deg);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.figure{position:absolute;bottom:0;animation:walk 1.2s ease-in-out infinite;}
.figure.rev{animation:walkL 1s ease-in-out infinite;}
.figure.bob{animation:bob 1.5s ease-in-out infinite;}

/* BUTTONS */
.btn{border:none;border-radius:var(--radius-sm);padding:11px 18px;font-size:14px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.15s;line-height:1.2;letter-spacing:.02em;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 4px 14px rgba(42,106,16,.35);}
.btn-primary:hover{background:linear-gradient(135deg,var(--accent),var(--accent-dark));box-shadow:0 4px 14px rgba(232,120,10,.35);}
.btn-secondary{background:var(--surface);color:var(--ink);border:2px solid var(--border);}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary);}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;box-shadow:0 4px 14px rgba(232,120,10,.30);}
.btn-accent:hover{filter:brightness(1.1);}
.btn-danger{background:var(--surface);color:var(--saida);border:2px solid var(--saida-soft);}
.btn-danger:hover{background:var(--saida-soft);}
.btn-ghost{background:transparent;color:var(--ink-soft);}
.btn-ghost:hover{color:var(--ink);background:var(--surface-2);}
.btn-block{width:100%;}
.btn-sm{padding:6px 12px;font-size:12.5px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;}

/* APP SHELL */
.app-shell{display:flex;min-height:100vh;}
.sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,#2A6A10 0%,#1E5008 70%,#3A7A10 100%);color:#fff;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;overflow:hidden;}
.sidebar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(0deg,rgba(232,120,10,.15),transparent);pointer-events:none;}
.sidebar-brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding:0 4px;}
.sidebar-logo{width:44px;height:44px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));}
.sidebar-brand-name{font-family:var(--font-display);font-size:20px;font-weight:400;line-height:1.1;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.2);}
.sidebar-nav{display:flex;flex-direction:column;gap:3px;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;color:rgba(255,255,255,.75);background:transparent;border:none;text-align:left;font-size:14px;font-weight:700;width:100%;transition:.15s;}
.nav-item:hover{background:rgba(255,255,255,.12);color:#fff;transform:translateX(3px);}
.nav-item.active{background:linear-gradient(135deg,rgba(232,120,10,.7),rgba(232,120,10,.4));color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.nav-item .ico{width:18px;height:18px;flex-shrink:0;}
.sidebar-figures{position:relative;height:60px;margin-top:4px;}
.sidebar-footer{font-size:10.5px;color:rgba(255,255,255,.4);padding:8px 6px 0;border-top:1px solid rgba(255,255,255,.12);margin-top:4px;}

.main-area{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:14px 28px;background:var(--surface);border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:20;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.topbar-title{font-size:20px;font-family:var(--font-display);color:var(--primary);font-weight:400;}
.mes-select-wrap{display:flex;align-items:center;gap:8px;}
.mes-select-wrap select{border:2px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-weight:700;font-family:var(--font-mono);font-size:13px;background:var(--surface-2);}
.editor-chip{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink-soft);}
.login-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--primary));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.content{padding:24px 28px 60px;flex:1;background:var(--bg);}
.mobile-tabs{display:none;}
@media (max-width:880px){
  .sidebar{display:none;}
  .mobile-tabs{display:flex;overflow-x:auto;gap:6px;background:linear-gradient(90deg,#2A6A10,#E8780A);padding:10px 12px;position:sticky;top:0;z-index:30;}
  .mobile-tabs .nav-item{white-space:nowrap;width:auto;flex-shrink:0;}
  .content{padding:18px 14px 50px;}
  .topbar{padding:12px 14px;}
}

/* CARDS / STATS */
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.section-head h2{font-size:26px;font-family:var(--font-display);color:var(--primary);font-weight:400;}
.section-sub{color:var(--ink-soft);font-size:13px;margin-top:3px;font-weight:600;}
.card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:18px 18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:.2s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--primary),var(--accent));}
.stat-card .label{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);}
.stat-card .value{font-family:var(--font-display);font-size:28px;font-weight:400;margin-top:6px;color:var(--ink);}
.stat-card .sub{font-size:12px;color:var(--ink-faint);margin-top:4px;font-weight:600;}
.stat-card.is-entrada::before{background:linear-gradient(90deg,var(--entrada),#5ACA7A);}
.stat-card.is-entrada .value{color:var(--entrada);}
.stat-card.is-saida::before{background:linear-gradient(90deg,var(--saida),#E07070);}
.stat-card.is-saida .value{color:var(--saida);}
.stat-card.is-alerta{border-color:var(--saida-soft);background:var(--saida-soft);}
.stat-card.is-alerta::before{background:var(--saida);}
.stat-card.is-alerta .label,.stat-card.is-alerta .value{color:var(--saida);}
.charts-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:22px;}
@media (max-width:760px){.charts-grid{grid-template-columns:1fr;}}
.chart-card h3{font-size:15px;margin-bottom:14px;font-weight:800;color:var(--ink-soft);}
.empty-state{padding:40px 20px;text-align:center;color:var(--ink-faint);font-size:14px;font-weight:700;}
.empty-state .ico{width:40px;height:40px;margin:0 auto 12px;color:var(--ink-faint);}

/* TABLES */
.table-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;justify-content:space-between;}
.search-input{border:2px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;font-size:14px;font-weight:600;min-width:220px;background:var(--surface);}
.search-input:focus{border-color:var(--accent);outline:none;}
.table-wrap{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);}
table{width:100%;border-collapse:collapse;font-size:14px;}
table.scroll-x{display:block;overflow-x:auto;}
thead th{text-align:left;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;padding:12px 16px;border-bottom:none;background:linear-gradient(135deg,var(--primary),var(--primary-dark));white-space:nowrap;}
tbody td{padding:12px 16px;border-bottom:2px solid var(--surface-2);vertical-align:middle;white-space:nowrap;font-weight:600;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface-2);}
td.wrap-ok,th.wrap-ok{white-space:normal;}
.col-actions{display:flex;gap:6px;justify-content:flex-end;}
.name-cell{font-weight:800;}
.name-cell button{font-weight:800;color:var(--primary);background:none;border:none;padding:0;text-align:left;}
.name-cell button:hover{color:var(--accent);text-decoration:underline;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:800;}
.badge-pago{background:var(--entrada-soft);color:var(--entrada);}
.badge-pendente{background:var(--accent-soft);color:#8A4400;}
.badge-atraso{background:var(--saida-soft);color:var(--saida);}
.badge-inativo{background:#EEF0EA;color:var(--ink-faint);}
.badge-ativo{background:var(--primary-soft);color:var(--primary-dark);}
.badge-entrada{background:var(--entrada-soft);color:var(--entrada);}
.badge-saida{background:var(--saida-soft);color:var(--saida);}
.badge-manual{background:var(--surface-2);color:var(--ink-soft);border:2px solid var(--border);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,50,10,.5);display:flex;align-items:center;justify-content:center;padding:18px;z-index:100;animation:fadeIn .15s ease;backdrop-filter:blur(2px);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-card{background:var(--surface);border-radius:var(--radius);max-width:540px;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.30);animation:modalIn .18s ease;border-top:4px solid var(--accent);}
.modal-card.wide{max-width:720px;}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:2px solid var(--border);}
.modal-header h3{font-size:20px;font-family:var(--font-display);color:var(--primary);font-weight:400;}
.modal-body{padding:20px 22px;overflow-y:auto;}
.modal-footer{padding:16px 22px;border-top:2px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.modal-close{background:none;border:none;color:var(--ink-soft);font-size:22px;line-height:1;padding:4px;font-weight:700;}
.modal-close:hover{color:var(--saida);}

/* TOAST */
#toast-root{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink);color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:700;box-shadow:var(--shadow-md);animation:toastIn .2s ease;max-width:300px;}
.toast.is-error{background:var(--saida);}
.toast.is-success{background:linear-gradient(135deg,var(--primary),var(--entrada));}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* CARNÊ */
.carne-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.carne-year-nav{display:flex;align-items:center;gap:10px;}
.carne-year-nav .year{font-family:var(--font-mono);font-weight:700;font-size:17px;min-width:50px;text-align:center;}
.carne-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media (min-width:560px){.carne-grid{grid-template-columns:repeat(6,1fr);}}
.carne-cell{border:2px dashed var(--border);border-radius:12px;padding:10px 6px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:96px;background:var(--surface-2);position:relative;text-align:center;transition:.2s;}
.carne-cell .mes-label{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.04em;}
.carne-cell.pago{border-style:solid;border-color:var(--entrada);background:#F0FBF4;}
.carne-cell.atraso{border-color:var(--saida);background:var(--saida-soft);}
.carne-cell.pendente{border-color:var(--accent);background:var(--accent-soft);}
.carne-cell.na{opacity:.35;}
.selo-pago-wrap{width:54px;height:54px;color:var(--entrada);animation:stampIn .35s cubic-bezier(.2,1.6,.4,1);}
@keyframes stampIn{from{opacity:0;transform:scale(1.6) rotate(2deg);}to{opacity:1;transform:scale(1) rotate(-8deg);}}
.selo-pago-wrap svg{width:100%;height:100%;transform:rotate(-8deg);}
.carne-action-btn{font-size:11px;font-weight:800;padding:5px 9px;border-radius:8px;border:none;cursor:pointer;}
.carne-action-btn.due{background:var(--saida);color:#fff;}
.carne-action-btn.pend{background:var(--accent);color:#fff;}
.carne-undo{position:absolute;top:4px;right:4px;background:none;border:none;color:var(--ink-faint);font-size:11px;padding:2px 4px;cursor:pointer;}
.carne-undo:hover{color:var(--saida);}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;font-size:12px;color:var(--ink-soft);font-weight:700;}
.legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

  if(str===null||str===undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function gerarId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function mesAtualStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function hojeStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function formatarMoeda(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function formatarData(iso){ if(!iso) return '—'; const p=iso.split('-'); if(p.length<3) return iso; return p[2]+'/'+p[1]+'/'+p[0]; }
const NOMES_MES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const NOMES_MES_LONGO=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function formatarMes(mesStr){ const p=mesStr.split('-').map(Number); return NOMES_MES[p[1]-1]+'/'+p[0]; }
function formatarMesLongo(mesStr){ const p=mesStr.split('-').map(Number); return NOMES_MES_LONGO[p[1]-1]+' de '+p[0]; }
function somaMes(mesStr,delta){ let [y,m]=mesStr.split('-').map(Number); m+=delta; while(m>12){m-=12;y+=1;} while(m<1){m+=12;y-=1;} return y+'-'+String(m).padStart(2,'0'); }
function mesesEntre(ini,fim){ const res=[]; let [ay,am]=ini.split('-').map(Number); const [by,bm]=fim.split('-').map(Number); let g=0; while((ay<by||(ay===by&&am<bm))&&g<2400){res.push(ay+'-'+String(am).padStart(2,'0'));am++;if(am>12){am=1;ay++;}g++;} return res; }
function iniciais(nome){ const p=String(nome||'').trim().split(/\s+/).filter(Boolean); if(!p.length) return '?'; if(p.length===1) return p[0].slice(0,2).toUpperCase(); return (p[0][0]+p[p.length-1][0]).toUpperCase(); }

function maskCPF(v){ const d=v.replace(/\D/g,'').slice(0,11); if(d.length>9) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'..-'); if(d.length>6) return d.replace(/(\d{3})(\d{3})(\d{1,3})/,'..'); if(d.length>3) return d.replace(/(\d{3})(\d{1,3})/,'.'); return d; }
function maskTelefone(v){ const d=v.replace(/\D/g,'').slice(0,11); if(d.length>10) return d.replace(/(\d{2})(\d{5})(\d{4})/,'() -'); if(d.length>6) return d.replace(/(\d{2})(\d{4})(\d{0,4})/,'() -'); if(d.length>2) return d.replace(/(\d{2})(\d{0,5})/,'() '); return d; }
function cpfValido(masked){ const cpf=String(masked||'').replace(/\D/g,''); if(cpf.length!==11||/^(\d)\1{10}$/.test(cpf)) return false; let soma=0,resto; for(let i=1;i<=9;i++) soma+=parseInt(cpf[i-1])*(11-i); resto=(soma*10)%11; if(resto===10||resto===11) resto=0; if(resto!==parseInt(cpf[9])) return false; soma=0; for(let i=1;i<=10;i++) soma+=parseInt(cpf[i-1])*(12-i); resto=(soma*10)%11; if(resto===10||resto===11) resto=0; return resto===parseInt(cpf[10]); }

function toast(msg,tipo){ const root=document.getElementById('toast-root'); const el=document.createElement('div'); el.className='toast'+(tipo?' is-'+tipo:''); el.textContent=msg; root.appendChild(el); setTimeout(()=>{el.style.transition='opacity .25s';el.style.opacity='0';setTimeout(()=>el.remove(),250);},2600); }

/* STORAGE */
async function storageGet(key,fallback){ try{ const r=await window.storage.get(key,true); return r?JSON.parse(r.value):fallback; }catch(e){ return fallback; } }
async function storageSet(key,value){ try{ const r=await window.storage.set(key,JSON.stringify(value),true); return !!r; }catch(e){ console.error('Erro ao salvar',key,e); return false; } }
async function carregarTudo(){
  const [associados,pagamentos,lancamentos]=await Promise.all([storageGet('iecis_associados',[]),storageGet('iecis_pagamentos',{}),storageGet('iecis_lancamentos',[])]);
  state.associados=associados; state.pagamentos=pagamentos; state.lancamentos=lancamentos;
}
async function atualizarChave(key,fallback,mutatorFn){ const atual=await storageGet(key,fallback); const copia=Array.isArray(atual)?atual.slice():{...atual}; const atualizado=mutatorFn(copia); const ok=await storageSet(key,atualizado); return {ok,dados:atualizado}; }

/* CÁLCULOS */
function chavePagamento(assocId,mes){ return assocId+'_'+mes; }
function associadosAtivos(){ return state.associados.filter(a=>a.ativo); }
function statusMes(assoc,mes){
  if(mes<assoc.dataAssociacao.slice(0,7)) return 'na';
  const pg=state.pagamentos[chavePagamento(assoc.id,mes)];
  if(pg&&pg.pago) return 'pago';
  const ma=mesAtualStr();
  if(mes>ma) return 'futuro';
  if(mes===ma) return 'pendente';
  return 'atraso';
}
function mesesAtrasados(assoc){ if(!assoc.ativo) return []; const ini=assoc.dataAssociacao.slice(0,7); return mesesEntre(ini,mesAtualStr()).filter(m=>statusMes(assoc,m)==='atraso'); }
function valorMensalidade(){ return Number((state.config&&state.config.mensalidade)||MENSALIDADE_PADRAO); }
function associadosObrigadosNoMes(mes){ return associadosAtivos().filter(a=>a.dataAssociacao.slice(0,7)<=mes); }
function listaLancamentosCompleta(){
  const lista=(state.lancamentos||[]).map(l=>({...l,origem:'manual'}));
  Object.keys(state.pagamentos||{}).forEach(key=>{
    const p=state.pagamentos[key];
    if(p&&p.pago){ const idx=key.lastIndexOf('_'); const assocId=key.slice(0,idx); const mesRef=key.slice(idx+1); const a=state.associados.find(x=>x.id===assocId); lista.push({id:'pgto_'+key,tipo:'entrada',categoria:'Mensalidade',descricao:'Mensalidade de '+formatarMes(mesRef)+(a?' — '+a.nome:''),valor:Number(p.valor||0),data:p.data,registradoPor:p.registradoPor||'—',origem:'mensalidade',mesRef,associadoId:assocId}); }
  });
  lista.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  return lista;
}
function calcularTotais(lista,mesFiltro){ const f=(!mesFiltro||mesFiltro==='todos')?lista:lista.filter(l=>l.data&&l.data.slice(0,7)===mesFiltro); let e=0,s=0; f.forEach(l=>{if(l.tipo==='entrada') e+=Number(l.valor||0); else s+=Number(l.valor||0);}); return {entradas:e,saidas:s,saldo:e-s,itens:f}; }
function calcularInadimplencia(){ const ativos=associadosAtivos(); const inad=ativos.map(a=>({associado:a,meses:mesesAtrasados(a)})).filter(x=>x.meses.length>0); return {inadimplentes:inad,valorTotal:inad.reduce((s,x)=>s+x.meses.length*valorMensalidade(),0)}; }

/* GRÁFICOS */
function graficoBarras(dadosMeses){
  const W=560,H=210,padL=40,padB=26,padT=10,gap=18;
  const max=Math.max(1,...dadosMeses.map(d=>Math.max(d.entradas,d.saidas)));
  const larg=(W-padL-10)/dadosMeses.length;
  const bW=Math.min(20,(larg-gap)/2);
  let bars='',labels='',grid='';
  for(let g=0;g<4;g++){ const y=padT+(H-padT-padB)*(1-g/3); grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+W+'" y2="'+y+'" stroke="var(--border)" stroke-width="1"/>'; grid+='<text x="'+(padL-8)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="var(--ink-faint)" font-family="var(--font-mono)">'+fmtC(max*g/3)+'</text>'; }
  dadosMeses.forEach((d,i)=>{ const cx=padL+larg*i+larg/2; const hE=(H-padT-padB)*(d.entradas/max); const hS=(H-padT-padB)*(d.saidas/max); bars+='<rect x="'+(cx-bW-3)+'" y="'+(H-padB-hE)+'" width="'+bW+'" height="'+hE+'" rx="3" fill="var(--entrada)"/>'; bars+='<rect x="'+(cx+3)+'" y="'+(H-padB-hS)+'" width="'+bW+'" height="'+hS+'" rx="3" fill="var(--saida)"/>'; labels+='<text x="'+cx+'" y="'+(H-7)+'" text-anchor="middle" font-size="10.5" fill="var(--ink-soft)" font-family="var(--font-mono)">'+formatarMes(d.mes).split('/')[0]+'</text>'; });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:100%;overflow:visible">'+grid+bars+labels+'</svg>';
}
function fmtC(v){ return v>=1000?'R$ '+(v/1000).toFixed(1).replace('.0','')+'k':'R$ '+Math.round(v); }
function graficoDonut(pago,pendente){ const total=pago+pendente; const W=180,H=180,cx=90,cy=90,r=66,sw=22; if(!total) return '<svg viewBox="0 0 '+W+' '+H+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="'+sw+'"/></svg>'; const c=2*Math.PI*r; const lP=c*pago/total; return '<svg viewBox="0 0 '+W+' '+H+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--accent-soft)" stroke-width="'+sw+'"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--entrada)" stroke-width="'+sw+'" stroke-dasharray="'+lP+' '+(c-lP)+'" stroke-dashoffset="'+(c*.25)+'" transform="scale(1,-1) translate(0,-'+H+')"/><text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" font-family="var(--font-display)" font-size="26" font-weight="600" fill="var(--ink)">'+Math.round(pago/total*100)+'%</text><text x="'+cx+'" y="'+(cy+18)+'" text-anchor="middle" font-size="10.5" fill="var(--ink-soft)">em dia</text></svg>'; }

function renderView(){ switch(state.view){ case 'associados': return renderAssociados(); case 'pagamentos': return renderPagamentos(); case 'fluxo': return renderFluxo(); case 'config': return renderConfig(); default: return renderPainel(); } }

/* PAINEL */
function renderPainel(){
  const mes=state.mesReferencia;
  const ativos=associadosAtivos();
  const obrigados=associadosObrigadosNoMes(mes);
  const pagos=obrigados.filter(a=>statusMes(a,mes)==='pago');
  const lista=listaLancamentosCompleta();
  const totaisMes=calcularTotais(lista,mes);
  const totaisGeral=calcularTotais(lista,'todos');
  const {inadimplentes,valorTotal}=calcularInadimplencia();
  const seqMeses=[]; for(let i=5;i>=0;i--) seqMeses.push(somaMes(mes,-i));
  const dadosMeses=seqMeses.map(m=>{ const t=calcularTotais(lista,m); return {mes:m,entradas:t.entradas,saidas:t.saidas}; });
  const topInad=inadimplentes.slice().sort((a,b)=>b.meses.length-a.meses.length).slice(0,5);
  return ''+
  '<div class="section-head"><div><h2>Painel geral</h2><div class="section-sub">'+formatarMesLongo(mes)+'</div></div></div>'+
  '<div class="stat-grid">'+
    statCard('Associados ativos',ativos.length,ativos.length+(ativos.length===1?' pessoa':' pessoas'),'')+
    statCard('Pagamentos no mês',pagos.length+' de '+obrigados.length,obrigados.length?Math.round(pagos.length/(obrigados.length||1)*100)+'% em dia':'—','')+
    statCard('Recebido no mês',formatarMoeda(totaisMes.entradas),'entradas do período','entrada')+
    statCard('Saídas no mês',formatarMoeda(totaisMes.saidas),'despesas do período','saida')+
    statCard('Saldo do mês',formatarMoeda(totaisMes.saldo),'entradas − saídas',totaisMes.saldo>=0?'entrada':'saida')+
    statCard('Saldo em caixa',formatarMoeda(totaisGeral.saldo),'acumulado total',totaisGeral.saldo>=0?'entrada':'saida')+
  '</div>'+
  (inadimplentes.length?'<div class="stat-grid" style="margin-bottom:22px"><div class="stat-card is-alerta" style="grid-column:span 2"><div class="label">Inadimplência (meses encerrados)</div><div class="value">'+inadimplentes.length+' associado'+(inadimplentes.length>1?'s':'')+'</div><div class="sub">'+formatarMoeda(valorTotal)+' em aberto</div></div></div>':'')+
  '<div class="charts-grid">'+
    '<div class="card chart-card"><h3>Entradas × Saídas — últimos 6 meses</h3>'+graficoBarras(dadosMeses)+'<div class="legend"><span><span class="dot" style="background:var(--entrada)"></span>Entradas</span><span><span class="dot" style="background:var(--saida)"></span>Saídas</span></div></div>'+
    '<div class="card chart-card"><h3>Situação dos pagamentos no mês</h3><div class="flex" style="justify-content:center">'+graficoDonut(pagos.length,obrigados.length-pagos.length)+'</div><div class="legend center" style="justify-content:center"><span><span class="dot" style="background:var(--entrada)"></span>Pago ('+pagos.length+')</span><span><span class="dot" style="background:var(--accent-soft);border:1px solid var(--accent)"></span>Pendente ('+(obrigados.length-pagos.length)+')</span></div></div>'+
  '</div>'+
  (topInad.length?
    '<div class="card"><div class="section-head" style="margin-bottom:12px"><h3 style="font-size:15px">Associados em atraso</h3></div><div class="table-wrap"><table><thead><tr><th>Nome</th><th>Meses em atraso</th><th>Valor em aberto</th><th></th></tr></thead><tbody>'+
    topInad.map(x=>'<tr><td class="name-cell">'+escapeHtml(x.associado.nome)+'</td><td>'+x.meses.length+'</td><td class="mono">'+formatarMoeda(x.meses.length*valorMensalidade())+'</td><td class="right"><button type="button" class="btn btn-secondary btn-sm" data-action="ver-carne" data-id="'+x.associado.id+'">Ver carnê</button></td></tr>').join('')+
    '</tbody></table></div></div>':
    '<div class="card empty-state">'+ICO.caixa+'<div>Nenhuma mensalidade em atraso. 🎉</div></div>'
  );
}
function statCard(label,value,sub,tipo){ return '<div class="stat-card'+(tipo?' is-'+tipo:'')+'"><div class="label">'+label+'</div><div class="value">'+value+'</div><div class="sub">'+sub+'</div></div>'; }

/* ASSOCIADOS */
function renderAssociados(){
  const termo=state.filtroAssociados.trim().toLowerCase();
  let lista=state.associados.slice();
  if(state.filtroStatus==='ativos') lista=lista.filter(a=>a.ativo);
  if(state.filtroStatus==='inativos') lista=lista.filter(a=>!a.ativo);
  if(termo) lista=lista.filter(a=>(a.nome||'').toLowerCase().includes(termo)||(a.cpf||'').replace(/\D/g,'').includes(termo.replace(/\D/g,'')));
  lista.sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const linhas=lista.map(a=>{
    const atraso=mesesAtrasados(a);
    return '<tr>'+
      '<td class="name-cell"><button type="button" data-action="ver-carne" data-id="'+a.id+'">'+escapeHtml(a.nome)+'</button></td>'+
      '<td class="mono">'+escapeHtml(a.cpf||'—')+'</td>'+
      '<td class="mono">'+escapeHtml(a.telefone||'—')+'</td>'+
      '<td class="wrap-ok" style="max-width:220px">'+escapeHtml(a.endereco||'—')+'</td>'+
      '<td>'+(a.ativo?'<span class="badge badge-ativo">Ativo</span>':'<span class="badge badge-inativo">Inativo</span>')+'</td>'+
      '<td>'+(atraso.length?'<span class="badge badge-atraso">'+atraso.length+' em atraso</span>':(a.ativo?'<span class="badge badge-pago">Em dia</span>':''))+'</td>'+
      '<td class="col-actions">'+
        '<button type="button" class="btn btn-secondary btn-sm" data-action="ver-carne" data-id="'+a.id+'">Carnê</button>'+
        '<button type="button" class="btn btn-secondary btn-sm" data-action="editar-associado" data-id="'+a.id+'">Editar</button>'+
        '<button type="button" class="btn btn-secondary btn-sm" data-action="toggle-ativo" data-id="'+a.id+'">'+(a.ativo?'Inativar':'Reativar')+'</button>'+
        '<button type="button" class="btn btn-danger btn-sm" data-action="excluir-associado" data-id="'+a.id+'">Excluir</button>'+
      '</td></tr>';
  }).join('');
  return ''+
  '<div class="section-head"><div><h2>Associados</h2><div class="section-sub">'+state.associados.length+' cadastrados • '+associadosAtivos().length+' ativos</div></div>'+
    '<button type="button" class="btn btn-primary" data-action="novo-associado">'+ICO.plus+' Novo associado</button></div>'+
  '<div class="table-toolbar">'+
    '<input type="text" class="search-input" placeholder="Buscar por nome ou CPF…" data-bind="filtroAssociados" value="'+escapeHtml(state.filtroAssociados)+'">'+
    '<select data-bind="filtroStatus" style="border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;">'+
      '<option value="ativos"'+(state.filtroStatus==='ativos'?' selected':'')+'>Somente ativos</option>'+
      '<option value="inativos"'+(state.filtroStatus==='inativos'?' selected':'')+'>Somente inativos</option>'+
      '<option value="todos"'+(state.filtroStatus==='todos'?' selected':'')+'>Todos</option>'+
    '</select>'+
  '</div>'+
  (lista.length?'<div class="table-wrap"><table class="scroll-x"><thead><tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Endereço</th><th>Status</th><th>Mensalidades</th><th></th></tr></thead><tbody>'+linhas+'</tbody></table></div>':
    '<div class="card empty-state">'+ICO.caixa+'<div>Nenhum associado encontrado.</div></div>');
}
function formAssociadoHTML(a){
  a=a||{nome:'',cpf:'',telefone:'',endereco:'',dataAssociacao:hojeStr()};

    '<div id="cpf-warn"></div>'+
    '<label>Endereço<textarea name="endereco" rows="2" required>'+escapeHtml(a.endereco)+'</textarea></label>'+

/* PAGAMENTOS */
function renderPagamentos(){
  const mes=state.mesReferencia;
  const obrigados=associadosObrigadosNoMes(mes).slice().sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const pagos=obrigados.filter(a=>statusMes(a,mes)==='pago').length;
  const linhas=obrigados.map(a=>{
    const st=statusMes(a,mes); const pg=state.pagamentos[chavePagamento(a.id,mes)];
    const badge=st==='pago'?'<span class="badge badge-pago">Pago</span>':st==='pendente'?'<span class="badge badge-pendente">Pendente</span>':st==='atraso'?'<span class="badge badge-atraso">Em atraso</span>':'<span class="badge badge-inativo">—</span>';
    const acao=st==='pago'?'<button type="button" class="btn btn-secondary btn-sm" data-action="desfazer-pagamento" data-id="'+a.id+'" data-mes="'+mes+'">Desfazer</button>':'<button type="button" class="btn btn-primary btn-sm" data-action="marcar-pago" data-id="'+a.id+'" data-mes="'+mes+'">Marcar pago</button>';
    return '<tr><td class="name-cell"><button type="button" data-action="ver-carne" data-id="'+a.id+'">'+escapeHtml(a.nome)+'</button></td><td>'+badge+'</td><td class="mono">'+(pg?formatarMoeda(pg.valor):'—')+'</td><td>'+(pg?formatarData(pg.data):'—')+'</td><td>'+(pg?escapeHtml(pg.forma||'—'):'—')+'</td><td class="col-actions">'+acao+'</td></tr>';
  }).join('');
  return ''+
  '<div class="section-head"><div><h2>Pagamentos</h2><div class="section-sub">'+formatarMesLongo(mes)+' • '+pagos+' de '+obrigados.length+' em dia</div></div></div>'+
  (obrigados.length?'<div class="table-wrap"><table class="scroll-x"><thead><tr><th>Nome</th><th>Status</th><th>Valor</th><th>Data</th><th>Forma</th><th></th></tr></thead><tbody>'+linhas+'</tbody></table></div>':
    '<div class="card empty-state">'+ICO.caixa+'<div>Nenhum associado a pagar neste mês.</div></div>');
}

/* CARNÊ */
function renderCarneModal(associadoId){
  const a=state.associados.find(x=>x.id===associadoId); if(!a) return '';
  const ano=state.carneAno||new Date().getFullYear();
  let celulas='';
  for(let m=1;m<=12;m++){
    const mesStr=ano+'-'+String(m).padStart(2,'0');
    const st=statusMes(a,mesStr); const pg=state.pagamentos[chavePagamento(a.id,mesStr)];
    let cont='';
    if(st==='pago') cont='<div class="selo-pago-wrap">'+seloPagoSVG(pg.data)+'</div><button type="button" class="carne-undo" data-action="desfazer-pagamento" data-id="'+a.id+'" data-mes="'+mesStr+'" data-origem="carne" title="Desfazer">desfazer</button>';
    else if(st==='atraso') cont='<span class="mono" style="font-size:11px;color:var(--saida);font-weight:700">EM ATRASO</span><button type="button" class="carne-action-btn due" data-action="marcar-pago" data-id="'+a.id+'" data-mes="'+mesStr+'" data-origem="carne">Registrar</button>';
    else if(st==='pendente') cont='<span class="mono" style="font-size:11px;color:#7A4400;font-weight:700">PENDENTE</span><button type="button" class="carne-action-btn pend" data-action="marcar-pago" data-id="'+a.id+'" data-mes="'+mesStr+'" data-origem="carne">Registrar</button>';
    else if(st==='futuro') cont='<span class="faint mono" style="font-size:18px">—</span>';
    else cont='<span class="faint mono" style="font-size:11px">antes do<br>ingresso</span>';
    celulas+='<div class="carne-cell '+st+'"><div class="mes-label">'+NOMES_MES[m-1]+'</div>'+cont+'</div>';
  }
  const atraso=mesesAtrasados(a);
  return '<div class="modal-header"><h3>Carnê — '+escapeHtml(a.nome)+'</h3><button type="button" class="modal-close" data-action="fechar-modal">&times;</button></div>'+
    '<div class="modal-body"><div class="carne-head"><div class="muted" style="font-size:13px">'+(atraso.length?atraso.length+' mês(es) em atraso':'Sem atrasos')+'</div><div class="carne-year-nav"><button type="button" class="btn btn-ghost btn-icon" data-action="carne-ano" data-delta="-1">‹</button><span class="year">'+ano+'</span><button type="button" class="btn btn-ghost btn-icon" data-action="carne-ano" data-delta="1">›</button></div></div><div class="carne-grid">'+celulas+'</div><div class="legend"><span><span class="dot" style="background:var(--entrada)"></span>Pago</span><span><span class="dot" style="background:var(--accent)"></span>Pendente</span><span><span class="dot" style="background:var(--saida)"></span>Em atraso</span><span><span class="dot" style="background:var(--ink-faint)"></span>N/A</span></div></div>'+
    '<div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="editar-associado" data-id="'+a.id+'">Editar associado</button><button type="button" class="btn btn-primary" data-action="fechar-modal">Fechar</button></div>';
}
function formPagamentoHTML(associadoId,mes){
  const a=state.associados.find(x=>x.id===associadoId);
  return '<form data-form="pagamento" data-associado-id="'+associadoId+'" data-mes="'+mes+'" class="form-grid">'+

}

/* FLUXO */
const CATEGORIAS_SAIDA=['Material de limpeza','Manutenção','Conta de água','Conta de luz','Aluguel/Espaço','Evento','Material de escritório','Serviços/Prestador','Outros'];
const CATEGORIAS_ENTRADA=['Doação','Evento/Festa','Aluguel de espaço','Patrocínio','Outros'];
function renderFluxo(){
  const lista=listaLancamentosCompleta();
  const mesFiltro=state.filtroFluxoPeriodo==='mes'?state.mesReferencia:'todos';
  const totais=calcularTotais(lista,mesFiltro);
  const linhas=totais.itens.map(l=>{
    const tipoBadge=l.tipo==='entrada'?'<span class="badge badge-entrada">Entrada</span>':'<span class="badge badge-saida">Saída</span>';
    const catBadge=l.origem==='mensalidade'?'<span class="badge badge-pago">Mensalidade</span>':'<span class="badge badge-manual">'+escapeHtml(l.categoria||'Manual')+'</span>';
    const acao=l.origem==='manual'?'<button type="button" class="btn btn-danger btn-sm" data-action="excluir-lancamento" data-id="'+l.id+'">Excluir</button>':'<span class="faint" style="font-size:12px">via Pagamentos</span>';
    return '<tr><td>'+formatarData(l.data)+'</td><td>'+tipoBadge+'</td><td>'+catBadge+'</td><td class="wrap-ok" style="max-width:260px">'+escapeHtml(l.descricao)+'</td><td class="mono right" style="color:'+(l.tipo==='entrada'?'var(--entrada)':'var(--saida)')+'">'+(l.tipo==='entrada'?'+ ':'− ')+formatarMoeda(l.valor)+'</td><td class="col-actions">'+acao+'</td></tr>';
  }).join('');
  return ''+
  '<div class="section-head"><div><h2>Fluxo de caixa</h2><div class="section-sub">Entradas e saídas financeiras do IECIS</div></div><button type="button" class="btn btn-primary" data-action="novo-lancamento">'+ICO.plus+' Novo lançamento</button></div>'+
  '<div class="table-toolbar"><select data-bind="filtroFluxoPeriodo"><option value="mes"'+(state.filtroFluxoPeriodo==='mes'?' selected':'')+'>Mês de referência ('+formatarMes(state.mesReferencia)+')</option><option value="todos"'+(state.filtroFluxoPeriodo==='todos'?' selected':'')+'>Todo o histórico</option></select></div>'+
  '<div class="stat-grid" style="margin-bottom:18px">'+statCard('Entradas',formatarMoeda(totais.entradas),'','entrada')+statCard('Saídas',formatarMoeda(totais.saidas),'','saida')+statCard('Saldo',formatarMoeda(totais.saldo),'',totais.saldo>=0?'entrada':'saida')+'</div>'+
  (totais.itens.length?'<div class="table-wrap"><table class="scroll-x"><thead><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th class="right">Valor</th><th></th></tr></thead><tbody>'+linhas+'</tbody></table></div>':
    '<div class="card empty-state">'+ICO.caixa+'<div>Nenhum lançamento neste período.</div></div>');
}
function formLancamentoHTML(){
  return '<form data-form="lancamento" class="form-grid">'+
    '<div class="form-row"><label>Tipo<select name="tipo" id="lanc-tipo" required><option value="entrada">Entrada</option><option value="saida">Saída</option></select></label>'+
    '<label>Valor (R$)<input name="valor" type="number" min="0" step="0.01" required></label></div>'+
    '<label>Categoria<select name="categoria" id="lanc-categoria">'+CATEGORIAS_ENTRADA.map(c=>'<option>'+c+'</option>').join('')+'</select></label>'+

    '<label>Data<input name="data" type="date" required value="'+hojeStr()+'"></label>'+
  '</form>';
}

/* CONFIG */
function renderConfig(){
  return ''+
  '<div class="section-head"><div><h2>Configurações</h2><div class="section-sub">Ajustes gerais do IECIS</div></div></div>'+
  '<div class="card" style="margin-bottom:18px"><h3 style="font-size:15px;margin-bottom:14px">Mensalidade</h3>'+
    '<form data-form="config-mensalidade" class="form-grid">'+
      '<label>Valor da mensalidade (R$)<input name="mensalidade" type="number" min="0" step="0.01" required value="'+Number(valorMensalidade()).toFixed(2)+'"></label>'+
      '<button type="submit" class="btn btn-primary" style="align-self:flex-start">Salvar</button>'+
    '</form></div>'+
  '<div class="card"><h3 style="font-size:15px;margin-bottom:6px">Backup dos dados</h3>'+
    '<p class="form-hint" style="margin-bottom:14px">Exporte ou restaure todos os dados do sistema.</p>'+
    '<div class="flex gap-sm wrap"><button type="button" class="btn btn-accent" data-action="exportar-backup">Exportar backup (.json)</button>'+
    '<label class="btn btn-secondary" style="cursor:pointer">Importar backup<input type="file" id="input-restaurar" accept=".json" style="display:none"></label></div>'+
  '</div>';
}

/* MODAL INFRA */
let _confirmCallback=null;
function abrirModal(html,opts){ const root=document.getElementById('modal-root'); root.innerHTML='<div class="modal-overlay"><div class="modal-card'+(opts&&opts.wide?' wide':'')+'">'+html+'</div></div>'; }
function fecharModal(){ document.getElementById('modal-root').innerHTML=''; _confirmCallback=null; }
function confirmarAcao(msgHtml,onConfirm,opts){
  opts=opts||{}; _confirmCallback=onConfirm;
  abrirModal('<div class="modal-header"><h3>'+(opts.titulo||'Confirmar')+'</h3><button type="button" class="modal-close" data-action="fechar-modal">&times;</button></div><div class="modal-body"><p style="margin:0">'+msgHtml+'</p></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="fechar-modal">Cancelar</button><button type="button" class="btn '+(opts.danger?'btn-danger':'btn-primary')+'" data-action="confirmar-acao">'+(opts.textoConfirmar||'Confirmar')+'</button></div>');
}
function abrirModalAssociado(id){
  const a=id?state.associados.find(x=>x.id===id):null;
  let html=formAssociadoHTML(a).replace('<form data-form="associado"','<form id="form-associado" data-form="associado"'+(id?' data-edit-id="'+id+'"':''));
  abrirModal('<div class="modal-header"><h3>'+(a?'Editar associado':'Novo associado')+'</h3><button type="button" class="modal-close" data-action="fechar-modal">&times;</button></div><div class="modal-body">'+html+'</div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="fechar-modal">Cancelar</button><button type="submit" form="form-associado" class="btn btn-primary">Salvar</button></div>');
}
function abrirCarneModal(){ abrirModal(renderCarneModal(state.carneAssociadoId),{wide:true}); }
function abrirModalPagamento(associadoId,mes,vindoCarne){
  state.pagamentoVoltaCarne=!!vindoCarne;
  let html=formPagamentoHTML(associadoId,mes).replace('<form data-form="pagamento"','<form id="form-pagamento" data-form="pagamento"');
  abrirModal('<div class="modal-header"><h3>Registrar pagamento</h3><button type="button" class="modal-close" data-action="fechar-modal">&times;</button></div><div class="modal-body">'+html+'</div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="fechar-modal">Cancelar</button><button type="submit" form="form-pagamento" class="btn btn-primary">Confirmar</button></div>');
}
function abrirModalLancamento(){
  let html=formLancamentoHTML().replace('<form data-form="lancamento"','<form id="form-lancamento" data-form="lancamento"');
  abrirModal('<div class="modal-header"><h3>Novo lançamento</h3><button type="button" class="modal-close" data-action="fechar-modal">&times;</button></div><div class="modal-body">'+html+'</div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="fechar-modal">Cancelar</button><button type="submit" form="form-lancamento" class="btn btn-primary">Salvar</button></div>');
}

/* AÇÕES */
async function onSubmitLogin(form,fd){
  const u=(fd.get('usuario')||'').trim();
  const s=(fd.get('senha')||'').trim();
  if(u===CREDENCIAIS.usuario&&s===CREDENCIAIS.senha){ state.currentUser=true; state.erroLogin=''; await carregarTudo(); renderApp(); }
  else{ state.erroLogin='Usuário ou senha incorretos.'; renderApp(); }
}
async function onSubmitAssociado(form,fd){
  const editId=form.dataset.editId||'';
  const nome=(fd.get('nome')||'').trim();
  const cpf=(fd.get('cpf')||'').trim();
  const telefone=(fd.get('telefone')||'').trim();
  const endereco=(fd.get('endereco')||'').trim();
  const dataAssociacao=fd.get('dataAssociacao');
  if(!cpfValido(cpf)&&!form.dataset.cpfConfirmado){ const w=document.getElementById('cpf-warn'); if(w) w.innerHTML='<div class="field-error">CPF parece inválido. Confira e clique em Salvar novamente para confirmar.</div>'; form.dataset.cpfConfirmado='1'; return; }
  const campos={nome,cpf,telefone,endereco,dataAssociacao};
  const {dados}=await atualizarChave('iecis_associados',[],lista=>{ if(editId){ const i=lista.findIndex(a=>a.id===editId); if(i>-1) lista[i]={...lista[i],...campos}; }else{ lista.push({id:gerarId(),...campos,ativo:true,criadoEm:new Date().toISOString()}); } return lista; });
  state.associados=dados; fecharModal(); toast(editId?'Associado atualizado.':'Associado cadastrado.','success'); renderApp();
}
async function toggleAtivoAssociado(id){ const {dados}=await atualizarChave('iecis_associados',[],lista=>{ const i=lista.findIndex(a=>a.id===id); if(i>-1) lista[i].ativo=!lista[i].ativo; return lista; }); state.associados=dados; renderApp(); toast('Status atualizado.','success'); }
function confirmarExcluirAssociado(id){ const a=state.associados.find(x=>x.id===id); confirmarAcao('Excluir <strong>'+escapeHtml(a?a.nome:'')+'</strong>? Também remove o histórico de pagamentos. Não pode ser desfeito.',async()=>{ await atualizarChave('iecis_associados',[],l=>l.filter(x=>x.id!==id)); await atualizarChave('iecis_pagamentos',{},m=>{ Object.keys(m).forEach(k=>{const i=k.lastIndexOf('_');if(i>-1&&k.slice(0,i)===id)delete m[k];}); return m; }); await carregarTudo(); renderApp(); toast('Associado excluído.','success'); },{titulo:'Excluir associado',danger:true,textoConfirmar:'Excluir'}); }
async function onSubmitPagamento(form,fd){
  const associadoId=form.dataset.associadoId; const mes=form.dataset.mes;
  const valor=Number(fd.get('valor')); const data=fd.get('data'); const forma=fd.get('forma');
  const key=chavePagamento(associadoId,mes);
  const {dados}=await atualizarChave('iecis_pagamentos',{},m=>{ m[key]={pago:true,valor,data,forma}; return m; });
  state.pagamentos=dados; if(state.pagamentoVoltaCarne){abrirCarneModal();}else{fecharModal();} toast('Pagamento registrado.','success'); renderApp();
}
function confirmarDesfazerPagamento(associadoId,mes,vindoCarne){
  confirmarAcao('Desfazer pagamento de '+formatarMes(mes)+'?',async()=>{
    const key=chavePagamento(associadoId,mes);
    const {dados}=await atualizarChave('iecis_pagamentos',{},m=>{delete m[key];return m;});
    state.pagamentos=dados; if(vindoCarne){state.carneAssociadoId=associadoId;abrirCarneModal();} renderApp(); toast('Pagamento desfeito.','success');
  },{titulo:'Desfazer pagamento',danger:true,textoConfirmar:'Desfazer'});
}
async function onSubmitLancamento(form,fd){
  const tipo=fd.get('tipo'); const categoria=fd.get('categoria'); const descricao=(fd.get('descricao')||'').trim(); const valor=Number(fd.get('valor')); const data=fd.get('data');
  const {dados}=await atualizarChave('iecis_lancamentos',[],lista=>{lista.push({id:gerarId(),tipo,categoria,descricao,valor,data});return lista;});
  state.lancamentos=dados; fecharModal(); toast('Lançamento registrado.','success'); renderApp();
}
function confirmarExcluirLancamento(id){ confirmarAcao('Excluir este lançamento?',async()=>{ const {dados}=await atualizarChave('iecis_lancamentos',[],l=>l.filter(x=>x.id!==id)); state.lancamentos=dados; renderApp(); toast('Excluído.','success'); },{titulo:'Excluir lançamento',danger:true,textoConfirmar:'Excluir'}); }
async function onSubmitConfigMensalidade(form,fd){ const m=Number(fd.get('mensalidade')); state.config={...state.config,mensalidade:m}; await storageSet('iecis_config',state.config); toast('Mensalidade atualizada.','success'); renderApp(); }
function exportarBackup(){
  const bk={versao:1,exportadoEm:new Date().toISOString(),associados:state.associados,pagamentos:state.pagamentos,lancamentos:state.lancamentos};
  const blob=new Blob([JSON.stringify(bk,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='iecis-backup-'+hojeStr()+'.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); toast('Backup exportado.','success');
}
function onRestaurarBackup(file){
  confirmarAcao('Restaurar vai <strong>substituir todos os dados atuais</strong>. Não pode ser desfeito.',async()=>{
    try{ const t=await file.text(); const d=JSON.parse(t); if(d.associados) await storageSet('iecis_associados',d.associados); if(d.pagamentos) await storageSet('iecis_pagamentos',d.pagamentos); if(d.lancamentos) await storageSet('iecis_lancamentos',d.lancamentos); await carregarTudo(); renderApp(); toast('Backup restaurado.','success'); }
    catch(e){ toast('Não foi possível ler o arquivo.','error'); }
  },{titulo:'Restaurar backup',danger:true,textoConfirmar:'Substituir dados'});
}

/* RENDER PRINCIPAL */
function renderLoading(){ return '<div class="auth-screen"><div class="muted">Carregando…</div></div>'; }
function renderApp(){
  const app=document.getElementById('app');
  if(state.loading){app.innerHTML=renderLoading();return;}
  if(!state.currentUser){app.innerHTML=renderLogin();return;}
  app.innerHTML=renderShell();
}
function preservarFoco(fn){ const a=document.activeElement; const b=a&&a.dataset?a.dataset.bind:null; const s=a?a.selectionStart:null; const e2=a?a.selectionEnd:null; fn(); if(b){const n=document.querySelector('[data-bind="'+b+'"]');if(n){n.focus();if(typeof s==='number'&&n.setSelectionRange)try{n.setSelectionRange(s,e2);}catch(e){}}} }

/* EVENTOS */
async function onGlobalClick(e){
  if(e.target&&e.target.classList&&e.target.classList.contains('modal-overlay')){fecharModal();return;}
  const btn=e.target.closest('[data-action]'); if(!btn) return;
  const action=btn.dataset.action; const id=btn.dataset.id;
  try{
    switch(action){
      case 'nav': state.view=btn.dataset.view; renderApp(); break;
      case 'logout': state.currentUser=null; renderApp(); break;
      case 'refresh': await carregarTudo(); renderApp(); toast('Atualizado.','success'); break;
      case 'fechar-modal': fecharModal(); break;
      case 'confirmar-acao': if(_confirmCallback){const cb=_confirmCallback;_confirmCallback=null;fecharModal();await cb();} break;
      case 'novo-associado': abrirModalAssociado(); break;
      case 'editar-associado': fecharModal(); setTimeout(()=>abrirModalAssociado(id),50); break;
      case 'excluir-associado': confirmarExcluirAssociado(id); break;
      case 'toggle-ativo': await toggleAtivoAssociado(id); break;
      case 'ver-carne': state.carneAssociadoId=id; state.carneAno=new Date().getFullYear(); abrirCarneModal(); break;
      case 'carne-ano': state.carneAno+=Number(btn.dataset.delta); abrirCarneModal(); break;
      case 'marcar-pago': abrirModalPagamento(id,btn.dataset.mes,btn.dataset.origem==='carne'); break;
      case 'desfazer-pagamento': confirmarDesfazerPagamento(id,btn.dataset.mes,btn.dataset.origem==='carne'); break;
      case 'novo-lancamento': abrirModalLancamento(); break;
      case 'excluir-lancamento': confirmarExcluirLancamento(id); break;
      case 'exportar-backup': exportarBackup(); break;
    }
  }catch(err){console.error(err);toast('Erro inesperado.','error');}
}
async function onGlobalSubmit(e){
  const form=e.target.closest('[data-form]'); if(!form) return; e.preventDefault();
  const tipo=form.dataset.form; const fd=new FormData(form);
  try{
    switch(tipo){
      case 'login': await onSubmitLogin(form,fd); break;
      case 'associado': await onSubmitAssociado(form,fd); break;
      case 'pagamento': await onSubmitPagamento(form,fd); break;
      case 'lancamento': await onSubmitLancamento(form,fd); break;
      case 'config-mensalidade': await onSubmitConfigMensalidade(form,fd); break;
    }
  }catch(err){console.error(err);toast('Erro ao salvar.','error');}
}
function onGlobalChange(e){
  const el=e.target;
  if(el.dataset&&el.dataset.bind){state[el.dataset.bind]=el.value;renderApp();return;}
  if(el.id==='lanc-tipo'){const s=document.getElementById('lanc-categoria');const opts=el.value==='entrada'?CATEGORIAS_ENTRADA:CATEGORIAS_SAIDA;if(s)s.innerHTML=opts.map(c=>'<option>'+c+'</option>').join('');return;}
  if(el.id==='input-restaurar'&&el.files&&el.files[0]){onRestaurarBackup(el.files[0]);return;}
}
function onGlobalInput(e){
  const el=e.target;
  if(el.dataset&&el.dataset.mask){let v=el.value;if(el.dataset.mask==='cpf')v=maskCPF(v);else if(el.dataset.mask==='telefone')v=maskTelefone(v);if(v!==el.value){el.value=v;try{el.setSelectionRange(v.length,v.length);}catch(e){}}return;}
  if(el.dataset&&el.dataset.bind&&(el.type==='text'||el.tagName==='TEXTAREA')){state[el.dataset.bind]=el.value;preservarFoco(renderApp);return;}
}
document.addEventListener('click',onGlobalClick);
document.addEventListener('submit',onGlobalSubmit);
document.addEventListener('change',onGlobalChange);
document.addEventListener('input',onGlobalInput);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){const r=document.getElementById('modal-root');if(r&&r.innerHTML.trim()!=='')fecharModal();}});

async function init(){
  state.loading=true; renderApp();
  const cfg=await storageGet('iecis_config',null);
  if(cfg&&cfg.mensalidade) state.config={...state.config,...cfg};
  state.loading=false; renderApp();
}
init();
</script>
</body>
