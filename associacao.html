<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Gestão da Associação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===================== TOKENS ===================== */
:root{
  --bg:#F6F4EC;
  --surface:#FFFFFF;
  --surface-2:#FBF9F3;
  --ink:#2B2B28;
  --ink-soft:#71695A;
  --ink-faint:#A39C8B;
  --primary:#1F4D43;
  --primary-dark:#163C34;
  --primary-soft:#E7EEEA;
  --accent:#C98A2E;
  --accent-soft:#F6E8D2;
  --entrada:#3C7A5E;
  --entrada-soft:#E1EEE6;
  --saida:#B5563C;
  --saida-soft:#F4E2DC;
  --border:#E4DCC9;
  --shadow-sm:0 1px 2px rgba(43,43,40,.06);
  --shadow-md:0 4px 16px rgba(43,43,40,.08);
  --radius:14px;
  --radius-sm:9px;
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'IBM Plex Mono','Courier New',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:var(--font-display);color:var(--ink);margin:0;font-weight:600;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:15px;}
a{color:var(--primary);}
::selection{background:var(--accent-soft);}
.mono{font-family:var(--font-mono);}
.muted{color:var(--ink-soft);}
.faint{color:var(--ink-faint);}
.hidden{display:none !important;}
.center{text-align:center;}
.right{text-align:right;}
.flex{display:flex;align-items:center;}
.gap-sm{gap:8px;}
.gap{gap:12px;}
.gap-lg{gap:20px;}
.wrap{flex-wrap:wrap;}
.spread{justify-content:space-between;}
.grow{flex:1;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

/* ===================== AUTH / SETUP SCREENS ===================== */
.auth-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 16px;
  background:
    radial-gradient(circle at 12% 18%, rgba(31,77,67,.06), transparent 40%),
    radial-gradient(circle at 88% 82%, rgba(201,138,46,.08), transparent 45%),
    var(--bg);
}
.auth-card{
  width:100%;
  max-width:460px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-md);
  padding:36px 32px;
}
.brand-mark{color:var(--primary);width:64px;height:64px;margin:0 auto 18px;display:block;}
.selo-svg{width:100%;height:100%;}
.auth-title{font-size:24px;text-align:center;margin-bottom:6px;}
.auth-sub{text-align:center;color:var(--ink-soft);font-size:13.5px;margin:0 0 24px;}
.form-grid{display:flex;flex-direction:column;gap:14px;}
.form-grid label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:var(--ink-soft);}
.form-grid input,.form-grid select,.form-grid textarea{
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:10px 12px;
  font-size:15px;
  color:var(--ink);
  background:var(--surface);
  font-weight:400;
  width:100%;
}
.form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{border-color:var(--primary);}
.form-row{display:flex;gap:12px;}
.form-row > label{flex:1;}
.form-hint{font-size:12.5px;color:var(--ink-soft);margin:2px 0 0;line-height:1.45;}
.field-error{font-size:12px;color:var(--saida);margin-top:-2px;}
.divider{height:1px;background:var(--border);margin:6px 0;}
.editor-fields{display:flex;gap:10px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;background:var(--surface-2);}
.editor-fields label{flex:1;}
.editor-fields input[name^="editorPin"]{font-family:var(--font-mono);letter-spacing:4px;text-align:center;}

.login-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.login-pick{
  display:flex;align-items:center;gap:12px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;background:var(--surface);text-align:left;width:100%;
  font-size:15px;font-weight:600;color:var(--ink);transition:.15s;
}
.login-pick:hover{border-color:var(--primary);background:var(--primary-soft);}
.login-pick.selected{border-color:var(--accent);background:var(--accent-soft);}
.login-avatar{
  width:34px;height:34px;border-radius:50%;background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;flex-shrink:0;
}
.pin-entry{display:none;flex-direction:column;gap:14px;margin-top:6px;}
.pin-entry.show{display:flex;}
.pin-entry input{
  font-family:var(--font-mono);font-size:26px;letter-spacing:14px;text-align:center;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;width:100%;
}
.error-banner{
  background:var(--saida-soft);color:var(--saida);border-radius:var(--radius-sm);
  padding:10px 12px;font-size:13px;font-weight:600;margin-top:4px;
}

/* ===================== BUTTONS ===================== */
.btn{
  border:none;border-radius:var(--radius-sm);padding:10px 16px;font-size:14px;font-weight:600;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.15s;line-height:1.2;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-secondary{background:var(--surface);color:var(--ink);border:1.5px solid var(--border);}
.btn-secondary:hover{border-color:var(--primary);}
.btn-accent{background:var(--accent);color:#fff;}
.btn-accent:hover{background:#B27822;}
.btn-danger{background:var(--surface);color:var(--saida);border:1.5px solid var(--saida-soft);}
.btn-danger:hover{background:var(--saida-soft);}
.btn-ghost{background:transparent;color:var(--ink-soft);}
.btn-ghost:hover{color:var(--ink);background:var(--surface-2);}
.btn-block{width:100%;}
.btn-sm{padding:6px 11px;font-size:12.5px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:50%;}

/* ===================== APP SHELL ===================== */
.app-shell{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex-shrink:0;background:var(--primary);color:#fff;
  display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;
}
.sidebar-brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:0 6px;}
.sidebar-brand .selo-svg{width:36px;height:36px;color:var(--accent);}
.sidebar-brand-name{font-family:var(--font-display);font-size:15.5px;font-weight:600;line-height:1.25;}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;
  color:rgba(255,255,255,.78);background:transparent;border:none;text-align:left;font-size:14px;font-weight:600;width:100%;
}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.14);color:#fff;}
.nav-item .ico{width:18px;height:18px;flex-shrink:0;}
.sidebar-footer{font-size:11.5px;color:rgba(255,255,255,.5);padding:10px 6px 0;border-top:1px solid rgba(255,255,255,.12);margin-top:10px;}

.main-area{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  padding:14px 28px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;
}
.topbar-title{font-size:19px;}
.mes-select-wrap{display:flex;align-items:center;gap:8px;}
.mes-select-wrap select{
  border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-weight:600;font-family:var(--font-mono);font-size:13.5px;background:var(--surface-2);
}
.editor-chip{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink-soft);}
.editor-chip .login-avatar{width:26px;height:26px;font-size:12px;}
.content{padding:24px 28px 60px;flex:1;}
.mobile-tabs{display:none;}

@media (max-width:880px){
  .sidebar{display:none;}
  .mobile-tabs{
    display:flex;overflow-x:auto;gap:6px;background:var(--primary);padding:10px 12px;
    position:sticky;top:0;z-index:30;
  }
  .mobile-tabs .nav-item{white-space:nowrap;width:auto;flex-shrink:0;}
  .content{padding:18px 14px 50px;}
  .topbar{padding:12px 14px;}
}

/* ===================== CARDS / STATS ===================== */
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.section-head h2{font-size:21px;}
.section-sub{color:var(--ink-soft);font-size:13px;margin-top:2px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:17px 18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.stat-card .label{font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-soft);}
.stat-card .value{font-family:var(--font-display);font-size:27px;font-weight:600;margin-top:4px;}
.stat-card .sub{font-size:12px;color:var(--ink-faint);margin-top:3px;}
.stat-card.is-entrada .value{color:var(--entrada);}
.stat-card.is-saida .value{color:var(--saida);}
.stat-card.is-alerta{border-color:var(--saida-soft);background:var(--saida-soft);}
.stat-card.is-alerta .label,.stat-card.is-alerta .value{color:var(--saida);}
.charts-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:22px;}
@media (max-width:760px){.charts-grid{grid-template-columns:1fr;}}
.chart-card h3{font-size:14.5px;margin-bottom:14px;}
.empty-state{padding:40px 20px;text-align:center;color:var(--ink-faint);font-size:13.5px;}
.empty-state .ico{width:38px;height:38px;margin:0 auto 10px;color:var(--ink-faint);}

/* ===================== TABLES ===================== */
.table-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;justify-content:space-between;}
.search-input{
  border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;
  min-width:220px;background:var(--surface);
}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);}
table{width:100%;border-collapse:collapse;font-size:13.8px;}
table.scroll-x{display:block;overflow-x:auto;}
thead th{
  text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
  color:var(--ink-soft);padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap;
}
tbody td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface-2);}
td.wrap-ok,th.wrap-ok{white-space:normal;}
.col-actions{display:flex;gap:6px;justify-content:flex-end;}
.name-cell{font-weight:600;}
.name-cell button{font-weight:600;color:var(--ink);background:none;border:none;padding:0;text-align:left;}
.name-cell button:hover{color:var(--primary);text-decoration:underline;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;}
.badge-pago{background:var(--entrada-soft);color:var(--entrada);}
.badge-pendente{background:var(--accent-soft);color:#9C6A1F;}
.badge-atraso{background:var(--saida-soft);color:var(--saida);}
.badge-inativo{background:#EFEBE2;color:var(--ink-faint);}
.badge-ativo{background:var(--primary-soft);color:var(--primary);}
.badge-entrada{background:var(--entrada-soft);color:var(--entrada);}
.badge-saida{background:var(--saida-soft);color:var(--saida);}
.badge-manual{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--border);}

/* ===================== MODAL ===================== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(31,28,20,.42);display:flex;align-items:center;justify-content:center;
  padding:18px;z-index:100;animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-card{
  background:var(--surface);border-radius:var(--radius);max-width:540px;width:100%;max-height:88vh;
  display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .18s ease;
}
.modal-card.wide{max-width:700px;}
@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:none;}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);}
.modal-header h3{font-size:18px;}
.modal-body{padding:20px 22px;overflow-y:auto;}
.modal-footer{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.modal-close{background:none;border:none;color:var(--ink-soft);font-size:20px;line-height:1;padding:4px;}
.modal-close:hover{color:var(--ink);}

/* ===================== TOAST ===================== */
#toast-root{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--ink);color:#fff;padding:12px 18px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;
  box-shadow:var(--shadow-md);animation:toastIn .2s ease;max-width:300px;
}
.toast.is-error{background:var(--saida);}
.toast.is-success{background:var(--primary);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* ===================== CARNÊ DIGITAL ===================== */
.carne-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.carne-year-nav{display:flex;align-items:center;gap:10px;}
.carne-year-nav .year{font-family:var(--font-mono);font-weight:700;font-size:16px;min-width:48px;text-align:center;}
.carne-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media (min-width:560px){.carne-grid{grid-template-columns:repeat(6,1fr);}}
.carne-cell{
  border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:10px 6px 12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:96px;
  background:var(--surface-2);position:relative;text-align:center;
}
.carne-cell .mes-label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.03em;}
.carne-cell.pago{border-style:solid;border-color:var(--entrada);background:#fff;}
.carne-cell.atraso{border-color:var(--saida);background:var(--saida-soft);}
.carne-cell.pendente{border-color:var(--accent);background:var(--accent-soft);}
.carne-cell.na{opacity:.4;}
.selo-pago-wrap{width:54px;height:54px;color:var(--entrada);animation:stampIn .35s cubic-bezier(.2,1.6,.4,1);}
@keyframes stampIn{from{opacity:0;transform:scale(1.6) rotate(2deg);}to{opacity:1;transform:scale(1) rotate(-8deg);}}
.selo-pago-wrap svg{width:100%;height:100%;transform:rotate(-8deg);}
.carne-action-btn{font-size:11px;font-weight:700;padding:5px 8px;border-radius:7px;border:none;}
.carne-action-btn.due{background:var(--saida);color:#fff;}
.carne-action-btn.pend{background:var(--accent);color:#fff;}
.carne-undo{position:absolute;top:4px;right:4px;background:none;border:none;color:var(--ink-faint);font-size:11px;padding:2px 4px;}
.carne-undo:hover{color:var(--saida);}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;font-size:12px;color:var(--ink-soft);}
.legend .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<script>
'use strict';

/* ===================== ESTADO GLOBAL ===================== */
const state = {
  config: null,
  associados: [],
  pagamentos: {},
  lancamentos: [],
  currentEditor: null,
  view: 'painel',
  mesReferencia: mesAtualStr(),
  loading: true,
  carneAno: null,
  carneAssociadoId: null,
  loginSelecionado: null,
  erroLogin: '',
};

/* ===================== UTIL ===================== */
function escapeHtml(str){
  if(str===null||str===undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function gerarId(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,8);
}
function mesAtualStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function hojeStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function formatarMoeda(v){
  return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function formatarData(iso){
  if(!iso) return '—';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return p[2]+'/'+p[1]+'/'+p[0];
}
const NOMES_MES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const NOMES_MES_LONGO=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function formatarMes(mesStr){
  const partes=mesStr.split('-').map(Number);
  return NOMES_MES[partes[1]-1]+'/'+partes[0];
}
function formatarMesLongo(mesStr){
  const partes=mesStr.split('-').map(Number);
  return NOMES_MES_LONGO[partes[1]-1]+' de '+partes[0];
}
function somaMes(mesStr,delta){
  let [y,m]=mesStr.split('-').map(Number);
  m+=delta;
  while(m>12){m-=12;y+=1;}
  while(m<1){m+=12;y-=1;}
  return y+'-'+String(m).padStart(2,'0');
}
function mesesEntre(inicioMes,fimMesExclusivo){
  const res=[];
  let [ay,am]=inicioMes.split('-').map(Number);
  const [by,bm]=fimMesExclusivo.split('-').map(Number);
  let guard=0;
  while((ay<by||(ay===by&&am<bm))&&guard<2400){
    res.push(ay+'-'+String(am).padStart(2,'0'));
    am++; if(am>12){am=1;ay++;}
    guard++;
  }
  return res;
}
function iniciais(nome){
  const partes=String(nome||'').trim().split(/\s+/).filter(Boolean);
  if(partes.length===0) return '?';
  if(partes.length===1) return partes[0].slice(0,2).toUpperCase();
  return (partes[0][0]+partes[partes.length-1][0]).toUpperCase();
}
function debounce(fn,ms){
  let t;
  return function(...args){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,args),ms); };
}

/* Máscaras */
function maskCPF(value){
  const d=value.replace(/\D/g,'').slice(0,11);
  if(d.length>9) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
  if(d.length>6) return d.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
  if(d.length>3) return d.replace(/(\d{3})(\d{1,3})/,'$1.$2');
  return d;
}
function cpfValido(masked){
  const cpf=String(masked||'').replace(/\D/g,'');
  if(cpf.length!==11||/^(\d)\1{10}$/.test(cpf)) return false;
  let soma=0,resto;
  for(let i=1;i<=9;i++) soma+=parseInt(cpf.substring(i-1,i),10)*(11-i);
  resto=(soma*10)%11; if(resto===10||resto===11) resto=0;
  if(resto!==parseInt(cpf.substring(9,10),10)) return false;
  soma=0;
  for(let i=1;i<=10;i++) soma+=parseInt(cpf.substring(i-1,i),10)*(12-i);
  resto=(soma*10)%11; if(resto===10||resto===11) resto=0;
  if(resto!==parseInt(cpf.substring(10,11),10)) return false;
  return true;
}
function maskTelefone(value){
  const d=value.replace(/\D/g,'').slice(0,11);
  if(d.length>10) return d.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');
  if(d.length>6) return d.replace(/(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
  if(d.length>2) return d.replace(/(\d{2})(\d{0,5})/,'($1) $2');
  return d;
}

/* Toasts */
function toast(msg,tipo){
  const root=document.getElementById('toast-root');
  const el=document.createElement('div');
  el.className='toast'+(tipo?' is-'+tipo:'');
  el.textContent=msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .25s'; el.style.opacity='0'; setTimeout(()=>el.remove(),250); },2600);
}

/* ===================== ARMAZENAMENTO (compartilhado entre os 3 editores) ===================== */
async function storageGet(key,fallback){
  try{
    const r=await window.storage.get(key,true);
    return r? JSON.parse(r.value): fallback;
  }catch(e){
    return fallback;
  }
}
async function storageSet(key,value){
  try{
    const r=await window.storage.set(key,JSON.stringify(value),true);
    return !!r;
  }catch(e){
    console.error('Erro ao salvar',key,e);
    return false;
  }
}
async function carregarTudo(){
  const [config,associados,pagamentos,lancamentos]=await Promise.all([
    storageGet('config',null),
    storageGet('associados',[]),
    storageGet('pagamentos',{}),
    storageGet('lancamentos',[]),
  ]);
  state.config=config;
  state.associados=associados;
  state.pagamentos=pagamentos;
  state.lancamentos=lancamentos;
}
// Leitura+mutação+escrita, para reduzir a chance de duas pessoas perderem uma alteração simultânea.
async function atualizarChave(key,fallback,mutatorFn){
  const atual=await storageGet(key,fallback);
  const copia=Array.isArray(atual)? atual.slice(): {...atual};
  const atualizado=mutatorFn(copia);
  const ok=await storageSet(key,atualizado);
  return {ok,dados:atualizado};
}

/* ===================== CÁLCULOS ===================== */
function chavePagamento(associadoId,mes){ return associadoId+'_'+mes; }

function associadosAtivos(){ return state.associados.filter(a=>a.ativo); }

function statusMes(associado,mes){
  // 'na' (não associado ainda) | 'futuro' | 'pago' | 'pendente' (mês em curso) | 'atraso' (mês já encerrado)
  if(mes < associado.dataAssociacao.slice(0,7)) return 'na';
  const pg=state.pagamentos[chavePagamento(associado.id,mes)];
  if(pg && pg.pago) return 'pago';
  const mesAtual=mesAtualStr();
  if(mes>mesAtual) return 'futuro';
  if(mes===mesAtual) return 'pendente';
  return 'atraso';
}

function mesesAtrasados(associado){
  if(!associado.ativo) return [];
  const inicio=associado.dataAssociacao.slice(0,7);
  const meses=mesesEntre(inicio,mesAtualStr()); // não inclui o mês em curso
  return meses.filter(m=>statusMes(associado,m)==='atraso');
}

function valorMensalidade(){ return Number((state.config&&state.config.mensalidade)||0); }

function listaLancamentosCompleta(){
  const lista=state.lancamentos.map(l=>({...l,origem:'manual'}));
  Object.keys(state.pagamentos).forEach(key=>{
    const p=state.pagamentos[key];
    if(p&&p.pago){
      const idx=key.lastIndexOf('_');
      const assocId=key.slice(0,idx);
      const mesRef=key.slice(idx+1);
      const associado=state.associados.find(a=>a.id===assocId);
      lista.push({
        id:'pgto_'+key,
        tipo:'entrada',
        categoria:'Mensalidade',
        descricao:'Mensalidade de '+formatarMes(mesRef)+(associado? ' — '+associado.nome:''),
        valor:Number(p.valor||0),
        data:p.data,
        registradoPor:p.registradoPor||'—',
        origem:'mensalidade',
        mesRef:mesRef,
        associadoId:assocId,
      });
    }
  });
  lista.sort((a,b)=> (b.data||'').localeCompare(a.data||''));
  return lista;
}

function calcularTotais(lista,mesFiltro){
  const filtrada = (!mesFiltro||mesFiltro==='todos') ? lista : lista.filter(l=>l.data && l.data.slice(0,7)===mesFiltro);
  let entradas=0,saidas=0;
  filtrada.forEach(l=>{ if(l.tipo==='entrada') entradas+=Number(l.valor||0); else saidas+=Number(l.valor||0); });
  return {entradas,saidas,saldo:entradas-saidas,itens:filtrada};
}

function calcularInadimplencia(){
  const ativos=associadosAtivos();
  const inadimplentes=ativos.map(a=>({associado:a,meses:mesesAtrasados(a)})).filter(x=>x.meses.length>0);
  const valorTotal=inadimplentes.reduce((s,x)=>s+x.meses.length*valorMensalidade(),0);
  return {inadimplentes,valorTotal};
}

function associadosObrigadosNoMes(mes){
  return associadosAtivos().filter(a=>a.dataAssociacao.slice(0,7)<=mes);
}

/* ===================== GRÁFICOS (SVG, sem libs externas) ===================== */
function graficoBarras(dadosMeses){
  // dadosMeses: [{mes,entradas,saidas}]
  const W=560,H=210,padL=40,padB=26,padT=10,gap=18;
  const max=Math.max(1,...dadosMeses.map(d=>Math.max(d.entradas,d.saidas)));
  const larguraGrupo=(W-padL-10)/dadosMeses.length;
  const barW=Math.min(20,(larguraGrupo-gap)/2);
  let bars='', labels='', grid='';
  for(let g=0;g<4;g++){
    const y=padT+(H-padT-padB)*(1-g/3);
    grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+W+'" y2="'+y+'" stroke="var(--border)" stroke-width="1"/>';
    grid+='<text x="'+(padL-8)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="var(--ink-faint)" font-family="var(--font-mono)">'+formatarMoedaCompacta(max*g/3)+'</text>';
  }
  dadosMeses.forEach((d,i)=>{
    const cx=padL+larguraGrupo*i+larguraGrupo/2;
    const hE=(H-padT-padB)*(d.entradas/max);
    const hS=(H-padT-padB)*(d.saidas/max);
    const x1=cx-barW-3, x2=cx+3;
    bars+='<rect x="'+x1+'" y="'+(H-padB-hE)+'" width="'+barW+'" height="'+hE+'" rx="3" fill="var(--entrada)"/>';
    bars+='<rect x="'+x2+'" y="'+(H-padB-hS)+'" width="'+barW+'" height="'+hS+'" rx="3" fill="var(--saida)"/>';
    labels+='<text x="'+cx+'" y="'+(H-7)+'" text-anchor="middle" font-size="10.5" fill="var(--ink-soft)" font-family="var(--font-mono)">'+formatarMes(d.mes).split('/')[0]+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:100%;overflow:visible;font-family:var(--font-body)">'+grid+bars+labels+'</svg>';
}
function formatarMoedaCompacta(v){
  if(v>=1000) return 'R$ '+(v/1000).toFixed(1).replace('.0','')+'k';
  return 'R$ '+Math.round(v);
}
function graficoDonut(pago,pendente){
  const total=pago+pendente;
  const W=180,H=180,cx=90,cy=90,r=66,strokeW=22;
  if(total===0){
    return '<svg viewBox="0 0 '+W+' '+H+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="'+strokeW+'"/></svg>';
  }
  const circ=2*Math.PI*r;
  const fracPago=pago/total;
  const lenPago=circ*fracPago;
  const lenResto=circ-lenPago;
  return '<svg viewBox="0 0 '+W+' '+H+'">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--accent-soft)" stroke-width="'+strokeW+'"/>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--entrada)" stroke-width="'+strokeW+'" '+
      'stroke-dasharray="'+lenPago+' '+lenResto+'" stroke-dashoffset="'+(circ*0.25)+'" transform="scale(1,-1) translate(0,-'+H+')"/>'+
    '<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" font-family="var(--font-display)" font-size="26" font-weight="600" fill="var(--ink)">'+Math.round(fracPago*100)+'%</text>'+
    '<text x="'+cx+'" y="'+(cy+18)+'" text-anchor="middle" font-size="10.5" fill="var(--ink-soft)" font-family="var(--font-body)">em dia</text>'+
  '</svg>';
}

    const atrasoBadge=atraso.length>0? '<span class="badge badge-atraso">'+atraso.length+' em atraso</span>' : (a.ativo? '<span class="badge badge-pago">Em dia</span>':'');

      '<option value="inativos"'+(state.filtroStatus==='inativos'?' selected':'')+'>Somente inativos</option>'+

function renderPagamentos(){
  const mes=state.mesReferencia;
  const obrigados=associadosObrigadosNoMes(mes).slice().sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const linhas=obrigados.map(a=>{
    const st=statusMes(a,mes);
    const pg=state.pagamentos[chavePagamento(a.id,mes)];
    const badge= st==='pago'? '<span class="badge badge-pago">Pago</span>'
      : st==='pendente'? '<span class="badge badge-pendente">Pendente</span>'
      : st==='atraso'? '<span class="badge badge-atraso">Em atraso</span>'
      : '<span class="badge badge-inativo">—</span>';

      '<button type="button" class="btn btn-secondary btn-sm" data-action="desfazer-pagamento" data-id="'+a.id+'" data-mes="'+mes+'">Desfazer</button>' :
      '<button type="button" class="btn btn-primary btn-sm" data-action="marcar-pago" data-id="'+a.id+'" data-mes="'+mes+'">Marcar pago</button>';

      '<td>'+badge+'</td><td class="mono">'+(pg?formatarMoeda(pg.valor):'—')+'</td><td>'+(pg?formatarData(pg.data):'—')+'</td>'+

  );
}

function renderCarneModal(associadoId){
  const a=state.associados.find(x=>x.id===associadoId);
  if(!a) return '';
  const ano=state.carneAno||new Date().getFullYear();
  let celulas='';
  for(let m=1;m<=12;m++){
    const mesStr=ano+'-'+String(m).padStart(2,'0');
    const st=statusMes(a,mesStr);
    const pg=state.pagamentos[chavePagamento(a.id,mesStr)];
    let conteudo='', classe=st;
    if(st==='pago'){
      conteudo='<div class="selo-pago-wrap">'+seloPagoSVG(pg.data)+'</div><button type="button" class="carne-undo" data-action="desfazer-pagamento" data-id="'+a.id+'" data-mes="'+mesStr+'" data-origem="carne" title="Desfazer">desfazer</button>';
    }else if(st==='atraso'){
      conteudo='<span class="mono" style="font-size:11px;color:var(--saida);font-weight:700">EM ATRASO</span><button type="button" class="carne-action-btn due" data-action="marcar-pago" data-id="'+a.id+'" data-mes="'+mesStr+'" data-origem="carne">Registrar</button>';
    }else if(st==='pendente'){
      conteudo='<span class="mono" style="font-size:11px;color:#9C6A1F;font-weight:700">PENDENTE</span><button type="button" class="carne-action-btn pend" data-action="marcar-pago" data-id="'+a.id+'" data-mes="'+mesStr+'" data-origem="carne">Registrar</button>';
    }else if(st==='futuro'){
      conteudo='<span class="faint mono" style="font-size:18px">—</span>';
    }else{
      conteudo='<span class="faint mono" style="font-size:11px">antes do<br>ingresso</span>';
    }
    celulas+='<div class="carne-cell '+classe+'"><div class="mes-label">'+NOMES_MES[m-1]+'</div>'+conteudo+'</div>';
  }
  const atraso=mesesAtrasados(a);
  return ''+

      '<div class="carne-year-nav"><button type="button" class="btn btn-ghost btn-icon" data-action="carne-ano" data-delta="-1">‹</button><span class="year">'+ano+'</span><button type="button" class="btn btn-ghost btn-icon" data-action="carne-ano" data-delta="1">›</button></div></div>'+
    '<div class="carne-grid">'+celulas+'</div>'+
    '<div class="legend"><span><span class="dot" style="background:var(--entrada)"></span>Pago</span><span><span class="dot" style="background:var(--accent)"></span>Pendente (mês em curso)</span><span><span class="dot" style="background:var(--saida)"></span>Em atraso</span><span><span class="dot" style="background:var(--ink-faint)"></span>Não aplicável</span></div>'+
  '</div>'+
  '<div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="editar-associado" data-id="'+a.id+'">Editar dados do associado</button><button type="button" class="btn btn-primary" data-action="fechar-modal">Concluído</button></div>';

/* ===================== MODAL: infraestrutura genérica ===================== */
let _confirmCallback=null;
function abrirModal(html,opts){
  const root=document.getElementById('modal-root');
  root.innerHTML='<div class="modal-overlay"><div class="modal-card'+(opts&&opts.wide?' wide':'')+'">'+html+'</div></div>';
}
function fecharModal(){
  document.getElementById('modal-root').innerHTML='';
  _confirmCallback=null;
}
function confirmarAcao(mensagemHtml,onConfirm,opts){
  opts=opts||{};
  _confirmCallback=onConfirm;
  abrirModal(
    '<div class="modal-header"><h3>'+(opts.titulo||'Confirmar ação')+'</h3><button type="button" class="modal-close" data-action="fechar-modal">&times;</button></div>'+
    '<div class="modal-body"><p style="margin:0">'+mensagemHtml+'</p></div>'+
    '<div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="fechar-modal">Cancelar</button>'+
    '<button type="button" class="btn '+(opts.danger?'btn-danger':'btn-primary')+'" data-action="confirmar-acao">'+(opts.textoConfirmar||'Confirmar')+'</button></div>'
  );
}

    '<div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="fechar-modal">Cancelar</button>'+
    '<button type="submit" form="form-pagamento" class="btn btn-primary">Confirmar pagamento</button></div>'
  );
}
function abrirModalLancamento(){
  let formHtml=formLancamentoHTML();
  formHtml=formHtml.replace('<form data-form="lancamento"','<form id="form-lancamento" data-form="lancamento"');
  abrirModal(
    '<div class="modal-header"><h3>Novo lançamento</h3><button type="button" class="modal-close" data-action="fechar-modal">&times;</button></div>'+
    '<div class="modal-body">'+formHtml+'</div>'+
    '<div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="fechar-modal">Cancelar</button>'+
    '<button type="submit" form="form-lancamento" class="btn btn-primary">Salvar lançamento</button></div>'
  );
}
function abrirModalTrocarPin(){
  let formHtml=formTrocarPinHTML();
  formHtml=formHtml.replace('<form data-form="trocar-pin"','<form id="form-trocar-pin" data-form="trocar-pin"');
  abrirModal(
    '<div class="modal-header"><h3>Trocar meu PIN</h3><button type="button" class="modal-close" data-action="fechar-modal">&times;</button></div>'+
    '<div class="modal-body">'+formHtml+'</div>'+
    '<div class="modal-footer"><button type="button" class="btn btn-secondary" data-action="fechar-modal">Cancelar</button>'+
    '<button type="submit" form="form-trocar-pin" class="btn btn-primary">Salvar novo PIN</button></div>'
  );
}

/* ===================== AÇÕES: SETUP / LOGIN ===================== */
async function onSubmitSetup(form,fd){
  const nomeAssociacao=(fd.get('nomeAssociacao')||'').trim();
  const mensalidade=Number(fd.get('mensalidade'));
  const editores=[];
  for(let i=0;i<3;i++){
    const nome=(fd.get('editorNome'+i)||'').trim();
    const pin=(fd.get('editorPin'+i)||'').trim();
    if(!/^[0-9]{4}$/.test(pin)){
      document.getElementById('setup-erro').innerHTML='<div class="error-banner">O PIN do responsável '+(i+1)+' precisa ter exatamente 4 números.</div>';
      return;
    }
    editores.push({nome,pin});
  }
  const config={nomeAssociacao,mensalidade,editores};
  const ok=await storageSet('config',config);
  if(ok){
    state.config=config;
    toast('Configuração concluída!','success');
    renderApp();
  }else{
    document.getElementById('setup-erro').innerHTML='<div class="error-banner">Não foi possível salvar. Verifique a conexão e tente novamente.</div>';
  }
}
async function onSubmitLogin(form,fd){
  const pin=(fd.get('pin')||'').trim();
  const idx=state.loginSelecionado;
  const editor=state.config.editores[idx];
  if(editor&&editor.pin===pin){
    state.currentEditor=editor.nome;
    state.loginSelecionado=null;
    state.erroLogin='';
    renderApp();
  }else{
    state.erroLogin='PIN incorreto. Tente novamente.';
    renderApp();
    setTimeout(()=>{ const el=document.querySelector('input[name="pin"]'); if(el) el.focus(); },30);
  }
}

/* ===================== AÇÕES: ASSOCIADOS ===================== */
async function onSubmitAssociado(form,fd){
  const editId=form.dataset.editId||'';
  const nome=(fd.get('nome')||'').trim();
  const cpf=(fd.get('cpf')||'').trim();
  const telefone=(fd.get('telefone')||'').trim();
  const endereco=(fd.get('endereco')||'').trim();
  const dataAssociacao=fd.get('dataAssociacao');
  if(!cpfValido(cpf)&&!form.dataset.cpfConfirmado){
    const warn=document.getElementById('cpf-warn');
    if(warn) warn.innerHTML='<div class="field-error">Esse CPF não parece válido. Confira os números — se estiver correto, clique em Salvar novamente para confirmar.</div>';
    form.dataset.cpfConfirmado='1';
    return;
  }
  const camposBase={nome,cpf,telefone,endereco,dataAssociacao};
  const {dados}=await atualizarChave('associados',[],lista=>{
    if(editId){
      const idx=lista.findIndex(a=>a.id===editId);
      if(idx>-1) lista[idx]={...lista[idx],...camposBase};
    }else{
      lista.push({id:gerarId(),...camposBase,ativo:true,criadoPor:state.currentEditor,criadoEm:new Date().toISOString()});
    }
    return lista;
  });
  state.associados=dados;
  fecharModal();
  toast(editId?'Associado atualizado.':'Associado cadastrado.','success');
  renderApp();
}
async function toggleAtivoAssociado(id){
  const {dados}=await atualizarChave('associados',[],lista=>{
    const idx=lista.findIndex(a=>a.id===id);
    if(idx>-1) lista[idx].ativo=!lista[idx].ativo;
    return lista;
  });
  state.associados=dados;
  renderApp();
  toast('Status atualizado.','success');
}
function confirmarExcluirAssociado(id){
  const a=state.associados.find(x=>x.id===id);
  confirmarAcao(
    'Excluir definitivamente <strong>'+escapeHtml(a?a.nome:'')+'</strong>? Isso também remove o histórico de pagamentos dessa pessoa. Essa ação não pode ser desfeita.',
    async ()=>{
      await atualizarChave('associados',[],lista=>lista.filter(x=>x.id!==id));
      await atualizarChave('pagamentos',{},mapa=>{
        Object.keys(mapa).forEach(k=>{
          const idx=k.lastIndexOf('_');
          if(idx>-1&&k.slice(0,idx)===id) delete mapa[k];
        });
        return mapa;
      });
      await carregarTudo();
      renderApp();
      toast('Associado excluído.','success');
    },
    {titulo:'Excluir associado',danger:true,textoConfirmar:'Excluir'}
  );
}

/* ===================== AÇÕES: PAGAMENTOS ===================== */
async function onSubmitPagamento(form,fd){
  const associadoId=form.dataset.associadoId;
  const mes=form.dataset.mes;
  const valor=Number(fd.get('valor'));
  const data=fd.get('data');
  const forma=fd.get('forma');
  const key=chavePagamento(associadoId,mes);
  const {dados}=await atualizarChave('pagamentos',{},mapa=>{
    mapa[key]={pago:true,valor,data,forma,registradoPor:state.currentEditor};
    return mapa;
  });
  state.pagamentos=dados;
  if(state.pagamentoVoltaCarne){ abrirCarneModal(); } else { fecharModal(); }
  toast('Pagamento registrado.','success');
  renderApp();
}
function confirmarDesfazerPagamento(associadoId,mes,vindoDoCarne){
  confirmarAcao(
    'Desfazer o pagamento de '+formatarMes(mes)+'? O mês volta a aparecer como pendente.',
    async ()=>{
      const key=chavePagamento(associadoId,mes);
      const {dados}=await atualizarChave('pagamentos',{},mapa=>{ delete mapa[key]; return mapa; });
      state.pagamentos=dados;
      if(vindoDoCarne){ state.carneAssociadoId=associadoId; abrirCarneModal(); }
      renderApp();
      toast('Pagamento desfeito.','success');
    },
    {titulo:'Desfazer pagamento',danger:true,textoConfirmar:'Desfazer'}
  );
}

/* ===================== AÇÕES: FLUXO DE CAIXA ===================== */
async function onSubmitLancamento(form,fd){
  const tipo=fd.get('tipo');
  const categoria=fd.get('categoria');
  const descricao=(fd.get('descricao')||'').trim();
  const valor=Number(fd.get('valor'));
  const data=fd.get('data');
  const {dados}=await atualizarChave('lancamentos',[],lista=>{
    lista.push({id:gerarId(),tipo,categoria,descricao,valor,data,registradoPor:state.currentEditor});
    return lista;
  });
  state.lancamentos=dados;
  fecharModal();
  toast('Lançamento registrado.','success');
  renderApp();
}
function confirmarExcluirLancamento(id){
  confirmarAcao(
    'Excluir este lançamento? Essa ação não pode ser desfeita.',
    async ()=>{
      const {dados}=await atualizarChave('lancamentos',[],lista=>lista.filter(l=>l.id!==id));
      state.lancamentos=dados;
      renderApp();
      toast('Lançamento excluído.','success');
    },
    {titulo:'Excluir lançamento',danger:true,textoConfirmar:'Excluir'}
  );
}

/* ===================== AÇÕES: CONFIGURAÇÕES ===================== */
async function onSubmitConfigGeral(form,fd){
  const nomeAssociacao=(fd.get('nomeAssociacao')||'').trim();
  const mensalidade=Number(fd.get('mensalidade'));
  const {dados}=await atualizarChave('config',{},cfg=>({...cfg,nomeAssociacao,mensalidade}));
  state.config=dados;
  toast('Configurações salvas.','success');
  renderApp();
}
async function onSubmitTrocarPin(form,fd){
  const pinAtual=(fd.get('pinAtual')||'').trim();
  const pinNovo=(fd.get('pinNovo')||'').trim();
  const idx=state.config.editores.findIndex(e=>e.nome===state.currentEditor);
  if(idx===-1) return;
  if(state.config.editores[idx].pin!==pinAtual){
    document.getElementById('pin-erro').innerHTML='<div class="error-banner">PIN atual incorreto.</div>';
    return;
  }
  if(!/^[0-9]{4}$/.test(pinNovo)){
    document.getElementById('pin-erro').innerHTML='<div class="error-banner">O novo PIN precisa ter 4 números.</div>';
    return;
  }
  const {dados}=await atualizarChave('config',{},cfg=>{
    const editores=cfg.editores.slice();
    editores[idx]={...editores[idx],pin:pinNovo};
    return {...cfg,editores};
  });
  state.config=dados;
  fecharModal();
  toast('PIN atualizado.','success');
  renderApp();
}
function exportarBackup(){
  const backup={
    versao:1,
    exportadoEm:new Date().toISOString(),
    config:state.config,
    associados:state.associados,
    pagamentos:state.pagamentos,
    lancamentos:state.lancamentos,
  };
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const nomeArq=(state.config&&state.config.nomeAssociacao? state.config.nomeAssociacao.replace(/[^a-zA-Z0-9]+/g,'-').toLowerCase():'associacao')+'-backup-'+hojeStr()+'.json';
  a.download=nomeArq;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast('Backup exportado.','success');
}
function onRestaurarBackup(file){
  confirmarAcao(
    'Restaurar este backup vai <strong>substituir todos os dados atuais</strong> (associados, pagamentos e fluxo de caixa) pelos dados do arquivo. Essa ação não pode ser desfeita. Deseja continuar?',
    async ()=>{
      try{
        const texto=await file.text();
        const dados=JSON.parse(texto);
        if(!dados||typeof dados!=='object') throw new Error('formato inválido');
        if(dados.config) await storageSet('config',dados.config);
        if(dados.associados) await storageSet('associados',dados.associados);
        if(dados.pagamentos) await storageSet('pagamentos',dados.pagamentos);
        if(dados.lancamentos) await storageSet('lancamentos',dados.lancamentos);
        await carregarTudo();
        renderApp();
        toast('Backup restaurado com sucesso.','success');
      }catch(err){
        console.error(err);
        toast('Não foi possível ler esse arquivo de backup.','error');
      }
    },
    {titulo:'Restaurar backup',danger:true,textoConfirmar:'Substituir dados'}
  );
}

/* ===================== RENDER PRINCIPAL ===================== */
function renderApp(){
  const app=document.getElementById('app');
  if(state.loading){ app.innerHTML=renderLoading(); return; }
  if(!state.config||!state.config.editores||state.config.editores.length<3){
    app.innerHTML=renderSetup();
    return;
  }
  if(!state.currentEditor){
    app.innerHTML=renderLogin();
    return;
  }
  app.innerHTML=renderShell();
}

function preservarFoco(renderFn){
  const ativo=document.activeElement;
  const bindAtivo=(ativo&&ativo.dataset)? ativo.dataset.bind: null;
  const selStart=ativo? ativo.selectionStart: null;
  const selEnd=ativo? ativo.selectionEnd: null;
  renderFn();
  if(bindAtivo){
    const novo=document.querySelector('[data-bind="'+bindAtivo+'"]');
    if(novo){
      novo.focus();
      if(typeof selStart==='number'&&novo.setSelectionRange){
        try{ novo.setSelectionRange(selStart,selEnd); }catch(e){}
      }
    }
  }
}

/* ===================== EVENTOS GLOBAIS (delegação em document) ===================== */
async function onGlobalClick(e){
  if(e.target&&e.target.classList&&e.target.classList.contains('modal-overlay')){
    fecharModal();
    return;
  }
  const btn=e.target.closest('[data-action]');
  if(!btn) return;
  const action=btn.dataset.action;
  const id=btn.dataset.id;
  try{
    switch(action){
      case 'nav': state.view=btn.dataset.view; renderApp(); break;
      case 'logout': state.currentEditor=null; state.loginSelecionado=null; state.erroLogin=''; renderApp(); break;
      case 'refresh': await refrescarDados(); break;
      case 'escolher-editor':
        state.loginSelecionado=Number(btn.dataset.idx);
        state.erroLogin='';
        renderApp();
        setTimeout(()=>{ const el=document.querySelector('input[name="pin"]'); if(el) el.focus(); },30);
        break;
      case 'fechar-modal': fecharModal(); break;
      case 'confirmar-acao':
        if(_confirmCallback){
          const cb=_confirmCallback;
          _confirmCallback=null;
          fecharModal();
          await cb();
        }
        break;
      case 'novo-associado': abrirModalAssociado(); break;
      case 'editar-associado': abrirModalAssociado(id); break;
      case 'excluir-associado': confirmarExcluirAssociado(id); break;
      case 'toggle-ativo': await toggleAtivoAssociado(id); break;
      case 'ver-carne': state.carneAssociadoId=id; state.carneAno=new Date().getFullYear(); abrirCarneModal(); break;
      case 'carne-ano': state.carneAno+=Number(btn.dataset.delta); abrirCarneModal(); break;
      case 'marcar-pago': abrirModalPagamento(id,btn.dataset.mes,btn.dataset.origem==='carne'); break;
      case 'desfazer-pagamento': confirmarDesfazerPagamento(id,btn.dataset.mes,btn.dataset.origem==='carne'); break;
      case 'novo-lancamento': abrirModalLancamento(); break;
      case 'excluir-lancamento': confirmarExcluirLancamento(id); break;
      case 'trocar-pin': abrirModalTrocarPin(); break;
      case 'exportar-backup': exportarBackup(); break;
    }
  }catch(err){
    console.error(err);
    toast('Ocorreu um erro inesperado.','error');
  }
}

async function onGlobalSubmit(e){
  const form=e.target.closest('[data-form]');
  if(!form) return;
  e.preventDefault();
  const tipo=form.dataset.form;
  const fd=new FormData(form);
  try{
    switch(tipo){
      case 'setup': await onSubmitSetup(form,fd); break;
      case 'login': await onSubmitLogin(form,fd); break;
      case 'associado': await onSubmitAssociado(form,fd); break;
      case 'pagamento': await onSubmitPagamento(form,fd); break;
      case 'lancamento': await onSubmitLancamento(form,fd); break;
      case 'config-geral': await onSubmitConfigGeral(form,fd); break;
      case 'trocar-pin': await onSubmitTrocarPin(form,fd); break;
    }
  }catch(err){
    console.error(err);
    toast('Ocorreu um erro ao salvar.','error');
  }
}

function onGlobalChange(e){
  const el=e.target;
  if(el.dataset&&el.dataset.bind){
    state[el.dataset.bind]=el.value;
    renderApp();
    return;
  }
  if(el.id==='lanc-tipo'){
    const sel=document.getElementById('lanc-categoria');
    const opts=el.value==='entrada'? CATEGORIAS_ENTRADA: CATEGORIAS_SAIDA;
    if(sel) sel.innerHTML=opts.map(c=>'<option>'+c+'</option>').join('');
    return;
  }
  if(el.id==='input-restaurar'&&el.files&&el.files[0]){
    onRestaurarBackup(el.files[0]);
    return;
  }
}

function onGlobalInput(e){
  const el=e.target;
  if(el.dataset&&el.dataset.mask){
    const antes=el.value;
    let novo=antes;
    if(el.dataset.mask==='cpf') novo=maskCPF(antes);
    else if(el.dataset.mask==='telefone') novo=maskTelefone(antes);
    if(novo!==antes){
      el.value=novo;
      try{ el.setSelectionRange(novo.length,novo.length); }catch(err){}
    }
    return;
  }
  if(el.dataset&&el.dataset.bind&&(el.type==='text'||el.tagName==='TEXTAREA')){
    state[el.dataset.bind]=el.value;
    preservarFoco(renderApp);
    return;
  }
}

async function refrescarDados(){
  await carregarTudo();
  renderApp();
  toast('Dados atualizados.','success');
}

/* ===================== INICIALIZAÇÃO ===================== */
document.addEventListener('click',onGlobalClick);
document.addEventListener('submit',onGlobalSubmit);
document.addEventListener('change',onGlobalChange);
document.addEventListener('input',onGlobalInput);
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    const root=document.getElementById('modal-root');
    if(root&&root.innerHTML.trim()!=='') fecharModal();
  }
});

async function init(){
  state.loading=true;
  renderApp();
  await carregarTudo();
  state.loading=false;
  renderApp();
}
init();
</script>
